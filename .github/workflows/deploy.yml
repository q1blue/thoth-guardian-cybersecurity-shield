- **Unreal Engine 5.6**: Main simulation/rendering engine for high-fidelity visuals and MetaHuman integration.
- **Blender**: 3D modeling and animation; export assets (FBX/GLTF) for use in Unreal/Unity.
- **Unity 3D**: Rapid prototyping, AR/VR, or mobile/web modules; can interoperate with Unreal via APIs or shared assets.
- **Node.js/Express**: Backend API for handling integrations and business logic.
- **React/Next.js**: Frontend for the web application.
- **Git**: Version control.
- **GitHub Actions**: CI/CD for automated testing and deployment.
- **Docusaurus**: Documentation website.
- **Postman**: API testing.
- **HuggingFace/PyTorch**: AI and deep learning.
- **Solana, XRPL, ImmutableX**: Blockchain integrations for NFTs and smart contracts.

