Prerequisites

System Requirements

Node.js: Version 18.0 or highernpm: Version 8.0 or higher (or yarn 1.22+)Git: Latest versionOperating System: Windows 10+, macOS 10.15+, or Linux (Ubuntu 20.04+)

Hardware Requirements

RAM: Minimum 8GB, Recommended 16GB+Storage: 10GB free spaceCPU: Multi-core processor (Intel i5/AMD Ryzen 5 or better)GPU: Optional but recommended for AI training (NVIDIA GTX 1060+ or AMD RX 580+)

Installation

1. Clone the Repository

```bash git clone https://github.com/thoth-emerald/cybersecurity-shield.git cd cybersecurity-shield ```

2. Install Dependencies

```bash

Using npm

npm install

Or using yarn

yarn install ```

3. Environment Configuration

```bash

Copy environment template

cp .env.example .env

Edit environment variables

nano .env # or use your preferred editor ```

