### 6. Deployment

**GitHub Actions**:
Create a `.github/workflows` directory and add a `ci-cd.yml` file for CI/CD.

**Example CI/CD Pipeline**:
```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Build backend
      run: cd backend && npm install && npm run build

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org: your-org
        vercel-project: your-project
```

